<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f0f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    text-align:center;
}

.logo{
    width:100px;
    height:100px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#004c99;
}

#message{
    margin-top:15px;
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" alt="College Logo" class="logo">

<h2>Adhiparasakthi Engineering College</h2>

<form id="loginForm">
    <input type="text" placeholder="Username" required>
    <input type="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

<p id="message"></p>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    document.getElementById("message").textContent =
        "Demo login successful.";
});
</script>

</body>
</html>
