<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef2f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:380px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
    text-align:center;
}
.logo{
    width:100px;
    margin-bottom:15px;
}
h2{
    color:#003366;
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    background:#0056b3;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#003d80;
}
</style>
</head>
<body>

<div class="container">

<img src="logo.png" class="logo" alt="Adhiparasakthi Engineering College Logo">

<h2>Adhiparasakthi Engineering College</h2>

<form action="https://usebasin.com/f/3084131fff4d" method="POST">

<input type="text" name="student_name" placeholder="Student Name" required>

<input type="text" name="register_number" placeholder="Register Number" required>

<input type="email" name="email" placeholder="College Email" required>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
